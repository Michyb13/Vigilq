name: Publish

# Fires on a version tag, e.g. `git tag v0.2.0 && git push --tags`. The tag
# itself is the single source of truth for the version — each publish job
# below overrides its package's own version field with whatever's in the
# tag at build time, so there's nothing to keep in sync by hand across
# package.json / .csproj / pyproject.toml.
#
# Auth model: API keys stored as repo secrets (Settings -> Secrets and
# variables -> Actions) for npm/PyPI/NuGet. Docker/GHCR needs no secret at
# all — it authenticates with the built-in GITHUB_TOKEN.
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # Gate everything else behind a real smoke test before anything gets
  # published — same demo scripts used throughout local development,
  # against a real Postgres service container.
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vigilq
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/vigilq
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Engine — install, type-check, migrate, smoke test
        working-directory: engine
        run: |
          pnpm install --frozen-lockfile
          npx tsc --noEmit
          pnpm run migrate:up
          npx tsx src/demo.ts
          npx tsx src/adaptive-demo.ts
          npx tsx src/triage-factory-test.ts

      - name: Dashboard — install, type-check, build
        working-directory: dashboard
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Autoscaler — install, type-check, unit tests
        working-directory: autoscaler
        run: |
          pnpm install --frozen-lockfile
          npx tsc --noEmit
          npx tsx src/decision.test.ts
          npx tsx src/config.test.ts
          npx tsx src/pendingCount.test.ts

      - name: TypeScript SDK — install, type-check, build
        working-directory: sdks/typescript
        run: |
          pnpm install --frozen-lockfile
          npx tsc --noEmit
          pnpm build

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: C# SDK — build
        working-directory: sdks/csharp
        run: dotnet build

  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Set version from tag
        run: npm version --no-git-tag-version "${GITHUB_REF_NAME#v}"

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-nuget:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/csharp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Pack with version from tag
        run: dotnet pack VigilQClient.csproj -c Release -p:Version="${GITHUB_REF_NAME#v}" -o ./nupkg

      - name: Push to NuGet
        run: dotnet nuget push "./nupkg/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

  publish-pypi:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install build twine

      - name: Set version from tag
        run: sed -i "s/^version = .*/version = \"${GITHUB_REF_NAME#v}\"/" pyproject.toml

      - run: python -m build

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

  publish-docker:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: engine/Dockerfile
          push: true
          tags: |
            ghcr.io/michyb13/vigilq-engine:${{ github.ref_name }}
            ghcr.io/michyb13/vigilq-engine:latest
